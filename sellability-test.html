<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Sellability Test | Avantaland Academy</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/onboardingdash.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="test-main-container">
        <section class="hero" id="get-audit-form">
            <div class="container fade-in text-center">
                <h1>Take the <span class="text-gradient">sellability test</span></h1>
                <p>Enter the email you used to create you account</p>
                <form id="email-check-form" class="signup-form form-narrow" style="margin-bottom: 1.5rem;">
                    <input type="email" id="test-email" placeholder="Enter email..." required>
                    <button type="submit" class="btn btn-primary btn-game-start">Start Test</button>
                </form>
                <p class="mt-1" style="font-size: 0.9rem;">Not registered yet? <a href="product-test.html" style="text-decoration: underline; color: #00b771; font-weight: 600;">Sign up</a> to get access.</p>
                <p id="email-error-msg" class="error-msg"></p>
                <div class="hero-social-proof" style="justify-content: center; margin-top: 1.5rem;"> <div class="avatars"> <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Business Owner"> <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=100&q=80" alt="Business Owner"> <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=100&q=80" alt="Business Owner"> <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=100&q=80" alt="Business Owner"> <img src="https://images.unsplash.com/photo-1521119989659-a83eee488004?auto=format&fit=crop&w=100&q=80" alt="Business Owner"> <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=100&q=80" alt="Business Owner"> </div> <div class="social-text">Trusted by <span>100+</span> business owners</div> </div>
                <div id="form-message" style="margin-top: 1rem; display: none; font-weight: 600;"></div>
            </div>
        </section>

        <section id="quiz-screen" class="test-screen">
            <div class="container executor-card">
                <div class="quiz-face-container">
                    <svg id="quiz-face" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
                <div id="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="question-container">
                    <div class="question-content">
                        <span class="question-badge">Question <span id="current-q-number">1</span> / 12</span>
                        <h2 id="question-text"></h2>
                        <div class="pro-tip-box">
                            <p id="question-pro-tip"></p>
                        </div>
                    </div>
                    <div id="options-container"></div>
                    <div id="quiz-controls">
                        <button id="back-btn" class="btn btn-secondary">Back</button>
                        <button id="next-btn" class="btn btn-primary btn-game-next" disabled>Confirm & Next</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="loading-screen" class="test-screen">
            <div class="container text-center">
                <div class="loading-hud-ring">
                    <div class="hud-scanner"></div>
                </div>
                <h2 id="loading-text" class="text-gradient">Initializing...</h2>
            </div>
        </section>

        <section id="results-screen" class="test-screen">
            <div class="container text-center master-card">
                <div class="results-face-container">
                    <svg id="results-face" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width: 80px; height: 80px; margin: 0 auto 1rem;"></svg>
                </div>
                <h2>Your <span class="text-gradient">Audit Score</span></h2>
                <div id="score-gauge-container">
                    <div class="gauge-body">
                        <div class="gauge-fill"></div>
                        <div class="gauge-cover"></div>
                    </div>
                    <div id="score-text"></div>
                </div>
                <div id="results-verdict">
                    <h3 id="status-text"></h3>
                    <p id="meaning-text"></p>
                </div>
                <a href="https://selar.co/d811r7e3z9" target="_blank" id="cta-button" class="btn btn-primary">My Product is At Risk—Send me the 33 Brutal Truths to fix it ($6.99)</a>

                <!-- Persuasion Content -->
                <div id="results-persuasion-content" class="mt-4 text-left"></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="scripts/script.js"></script>
    <script src="scripts/sellability-test.js"></script>
</body>
</html>
