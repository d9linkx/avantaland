<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Avantaland Academy</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main>
        <section class="hero">
            <div class="container fade-in">
                <h1 class="text-center">Get in <span class="text-gradient">Touch.</span></h1>
                <p class="text-center">Have questions? We're here to help you start your journey.</p>
            </div>
        </section>

        <section class="section-padding">
            <div class="container contact-grid fade-in">
                <!-- Contact Form -->
                <div class="card">
                    <h3>Send us a message</h3>
                    <form class="signup-form form-full-width">
                        <input type="text" placeholder="Your Name">
                        <input type="email" placeholder="Your Email">
                        <textarea placeholder="Your Message" rows="5"></textarea>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>

                <!-- Contact Info & Image -->
                <div>
                    <div class="card">
                        <h3>Contact information</h3>
                        <p><strong>Address:</strong> 22 Aerodrome-Lab Estate, Lekki-Epe Expressway, Lagos, Nigeria</p>
                        <a href="mailto:avantaland@gmail.com" class="btn btn-secondary" style="width: 100%; margin: 0 0 0.5rem 0; display: flex; align-items: center; justify-content: center; gap: 8px;">
                            <i class="ph ph-envelope-simple"></i> Email Us
                        </a>
                        <a href="https://wa.me/2347070989034" class="btn btn-primary" style="width: 100%; margin: 0 0 1rem 0; background-color: #464646; border-color: #25D366; display: flex; align-items: center; justify-content: center; gap: 8px;">
                            <i class="ph ph-whatsapp-logo"></i> Message on WhatsApp
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="scripts/script.js"></script>
</body>
</html>
