<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Income Skill ROI Calculator | Avantaland Academy</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" type="image/png" href="images/15.png" sizes="100x100">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .calculator-card {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            padding: 3rem;
        }

        @media (max-width: 1024px) {
            .section-padding { padding-top: 120px; }
            .calculator-card { margin-top: 40px; }
        }

        @media (max-width: 768px) {
            .section-padding { padding-top: 100px; }
            .calculator-card {
                grid-template-columns: 1fr;
                padding: 2rem 1.5rem;
                gap: 2rem;
                margin-top: 20px;
            }
        }

        @media (max-width: 480px) {
            .calculator-card {
                padding: 1.5rem 1rem;
                gap: 1.5rem;
            }
            .stat-massive { font-size: 2.2rem !important; }
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .result-section {
            background: var(--brand-blue-light);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid var(--accent-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .calc-group label {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.75rem;
        }

        .calc-group label span {
            color: var(--accent-blue);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .skill-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .skill-opt {
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 700;
            transition: var(--transition);
        }

        .skill-opt.active {
            border-color: var(--accent-blue);
            background: white;
            color: var(--accent-blue);
        }

        .stat-massive {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-primary);
            margin: 0.5rem 0;
            overflow-wrap: break-word;
        }

        .roi-badge {
            display: inline-block;
            background: var(--text-main);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 1rem;
        }

        /* Beautiful Input Design */
        .settings-input {
            width: 100%;
            padding: 0.9rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fff;
            color: var(--text-main);
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .settings-input:hover {
            border-color: #cbd5e1;
        }
        .settings-input:focus {
            border-color: var(--accent-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 219, 135, 0.15), inset 0 2px 4px rgba(0,0,0,0.01);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="bg-light">
    <div id="header-placeholder"></div>

    <main class="section-padding">
        <div class="container">
            <div class="section-header">
                <h1>The <span class="text-gradient">ROI</span> of Mastery</h1>
                <p>Calculate how much your income could scale by trading low-leverage labor for high-income digital skills.</p>
            </div>

            <div class="glass-card calculator-card fade-in">
                <div class="input-section">
                    <div class="calc-group">
                        <label>Current Monthly Income (₦) <span id="val-income">200,000</span></label>
                        <input type="range" id="input-income" min="50000" max="1000000" step="10000" value="200000">
                    </div>

                    <div class="calc-group">
                        <label>Target Work Hours / Week <span id="val-hours">20</span></label>
                        <input type="range" id="input-hours" min="5" max="60" step="1" value="20">
                    </div>

                    <div class="calc-group">
                        <label>Select Skill Path</label>
                        <div class="skill-selector">
                            <div class="skill-opt active" data-skill="copywriting" data-rate="15000" data-fee="60000">Copywriting</div>
                            <div class="skill-opt" data-skill="ads" data-rate="12000" data-fee="20000">Ad Management</div>
                        </div>
                    </div>
                </div>

                <div class="result-section">
                    <p style="text-transform: uppercase; letter-spacing: 1px; font-weight: 700; opacity: 0.7;">Projected Monthly Income</p>
                    <div class="stat-massive" id="res-projected">₦1,200,000</div>
                    <p id="res-increase" style="color: var(--accent-blue); font-weight: 700;">+ ₦1,000,000 monthly increase</p>
                    
                    <div class="roi-badge" id="res-roi">1,667% Return on Course</div>
                    
                    <!-- Integrated Registration Form -->
                    <form id="roi-registration-form" style="margin-top: 2rem; text-align: left;">
                        <div class="form-group mb-1">
                            <input type="text" name="firstName" class="settings-input" placeholder="First Name" required>
                        </div>
                        <div class="form-group mb-1">
                            <input type="email" name="email" class="settings-input" placeholder="Email Address" required>
                        </div>
                        <!-- Hidden tracking fields for calculation data -->
                        <input type="hidden" name="skillSelected" id="hidden-skill">
                        <input type="hidden" name="projectedIncome" id="hidden-projected">
                        <input type="hidden" name="roiPercentage" id="hidden-roi">
                        
                        <button type="submit" id="roi-submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Secure My Spot</button>
                    </form>

                    <p style="font-size: 0.8rem; margin-top: 1.5rem; opacity: 0.7;">Based on 2026 average high-income hourly rates.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="scripts/script.js"></script>
    <script>
        const incomeInput = document.getElementById('input-income');
        const hoursInput = document.getElementById('input-hours');
        const skillOpts = document.querySelectorAll('.skill-opt');
        
        const valIncome = document.getElementById('val-income');
        const valHours = document.getElementById('val-hours');
        
        const resProjected = document.getElementById('res-projected');
        const resIncrease = document.getElementById('res-increase');
        const resRoi = document.getElementById('res-roi');
        
        const roiForm = document.getElementById('roi-registration-form');

        let activeRate = 15000;
        let activeFee = 60000;
        let activeSkill = 'copywriting';

        function calculate() {
            const currentIncome = parseInt(incomeInput.value);
            const targetHours = parseInt(hoursInput.value);
            
            // Update Labels
            valIncome.innerText = currentIncome.toLocaleString();
            valHours.innerText = targetHours;

            // Calculations: Rate * Hours * 4 weeks
            const projected = activeRate * targetHours * 4;
            const increase = projected - currentIncome;
            
            // ROI = (Monthly Increase / Course Fee) * 100
            const roi = Math.round((increase / activeFee) * 100);

            // Update UI
            resProjected.innerText = `₦${projected.toLocaleString()}`;
            resIncrease.innerText = increase > 0 ? `+ ₦${increase.toLocaleString()} monthly increase` : `Refine your target hours`;
            resRoi.innerText = increase > 0 ? `${roi.toLocaleString()}% Return on Investment` : `Break-even path`;

            // Sync hidden inputs for form submission
            document.getElementById('hidden-skill').value = activeSkill;
            document.getElementById('hidden-projected').value = projected.toLocaleString();
            document.getElementById('hidden-roi').value = roi + '%';

            // Animation trigger
            resProjected.classList.remove('price-update-animation');
            void resProjected.offsetWidth;
            resProjected.classList.add('price-update-animation');
        }

        incomeInput.addEventListener('input', calculate);
        hoursInput.addEventListener('input', calculate);

        skillOpts.forEach(opt => {
            opt.addEventListener('click', () => {
                skillOpts.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                activeRate = parseInt(opt.dataset.rate);
                activeFee = parseInt(opt.dataset.fee);
                activeSkill = opt.dataset.skill;
                calculate();
            });
        });

        // Form Submission Logic
        roiForm.onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('roi-submit-btn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const formData = new FormData(roiForm);
            // Map fields to match your AppScript expectations
            formData.append('coursesSelected', 'ROI Lead: ' + activeSkill);
            formData.append('totalPrice', 'Projected: ₦' + document.getElementById('hidden-projected').value);

            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbwcyD7SQcP_GTs6hrGG3k6tjtpjvN9XimlEkdyOlw-jUUvV5e2hpXViVRVlEFRkLhkN-w/exec', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.result === 'success') {
                    window.location.href = `enroll.html?course=${activeSkill}`;
                }
            } catch (error) {
                console.error(error);
                window.location.href = `enroll.html?course=${activeSkill}`;
            }
        };

        calculate();
    </script>
</body>
</html>
